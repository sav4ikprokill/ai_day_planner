spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ai_planner}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true

reports:
  worker:
    poll-delay-ms: ${REPORTS_POLL_DELAY_MS:5000}
    simulate-delay-ms: ${REPORTS_SIMULATE_DELAY_MS:2000}

logging:
  level:
    com.aiplanner.reports: INFO
