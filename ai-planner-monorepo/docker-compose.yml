services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner
      POSTGRES_DB: planner
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner -d planner"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./services/api-python
      dockerfile: Dockerfile
    environment:
      APP_NAME: AI Day Planner
      ENV: development
      DATABASE_URL: postgresql+asyncpg://planner:planner@postgres:5432/planner
      SCHEDULER_URL: http://scheduler-cpp:8080/optimize
      ALLOW_DEV_INIT_DATA_BYPASS: "true"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./services/worker-go
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://planner:planner@postgres:5432/planner
    depends_on:
      api:
        condition: service_healthy

  bot-js:
    profiles: ["telegram"]
    build:
      context: .
      dockerfile: ./services/bot-js/Dockerfile
    environment:
      API_BASE_URL: http://api:8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      api:
        condition: service_healthy

  web-platform:
    build:
      context: .
      dockerfile: ./apps/web-platform/Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
      VITE_DEMO_INIT_DATA: ${VITE_DEMO_INIT_DATA:-dev-mode-init-data}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "5173:5173"

volumes:
  postgres_data:

networks:
  default:
    name: ai-planner-network
