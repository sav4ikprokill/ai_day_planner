services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_planner
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_planner"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./services/api-python
      dockerfile: Dockerfile
    env_file:
      - ./services/api-python/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_planner
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./services/worker-go
      dockerfile: Dockerfile
    env_file:
      - ./services/worker-go/.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ai_planner?sslmode=disable
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  default:
    name: ai-planner-network
