services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: planner
      POSTGRES_PASSWORD: planner
      POSTGRES_DB: planner
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planner -d planner"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./services/api-python
      dockerfile: Dockerfile
    env_file:
      - ./services/api-python/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://planner:planner@postgres/planner
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./services/worker-go
      dockerfile: Dockerfile
    env_file:
      - ./services/worker-go/.env
    environment:
      DATABASE_URL: postgresql://planner:planner@postgres/planner
    depends_on:
      api:
        condition: service_healthy

  web-platform:
    build:
      context: ./apps/web-platform
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "5173:5173"

volumes:
  postgres_data:

networks:
  default:
    name: ai-planner-network
